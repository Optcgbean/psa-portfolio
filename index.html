<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSA Card Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(96, 165, 250, 0.2);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(96, 165, 250, 0.2);
        }

        .summary-card h3 {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .summary-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .summary-card.profit .value {
            color: #4ade80;
        }

        .summary-card.loss .value {
            color: #f87171;
        }

        .summary-card.return .value {
            color: #fbbf24;
        }

        /* Search */
        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        /* Table */
        .table-wrapper {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(96, 165, 250, 0.2);
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: rgba(15, 23, 42, 0.9);
        }

        th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: #60a5fa;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background 0.2s;
        }

        th:hover {
            background: rgba(96, 165, 250, 0.1);
        }

        th .sort-indicator {
            margin-left: 5px;
            opacity: 0.5;
        }

        th.sort-asc .sort-indicator::after {
            content: '▲';
            opacity: 1;
        }

        th.sort-desc .sort-indicator::after {
            content: '▼';
            opacity: 1;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(96, 165, 250, 0.1);
        }

        tr:hover {
            background: rgba(96, 165, 250, 0.05);
        }

        .card-thumb {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid rgba(96, 165, 250, 0.3);
        }

        .card-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(96, 165, 250, 0.4);
        }

        .no-image {
            width: 60px;
            height: 80px;
            background: rgba(100, 116, 139, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #64748b;
            border: 2px dashed rgba(100, 116, 139, 0.5);
        }

        .card-name {
            font-weight: 500;
            color: #f1f5f9;
        }

        .cert-number {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .grade {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .grade-10 {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .grade-9 {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .price {
            font-weight: 600;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .price-cost {
            color: #94a3b8;
        }

        .price-market {
            color: #60a5fa;
        }

        .profit {
            color: #4ade80;
        }

        .loss {
            color: #f87171;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #e2e8f0;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.8);
            border: none;
            color: #e2e8f0;
            font-size: 1.5rem;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 8px;
            opacity: 0.7;
            transition: opacity 0.2s, background 0.2s;
        }

        .modal-nav:hover {
            opacity: 1;
            background: rgba(96, 165, 250, 0.3);
        }

        .modal-prev {
            left: -60px;
        }

        .modal-next {
            right: -60px;
        }

        .modal-info {
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            text-align: center;
            color: #94a3b8;
        }

        /* Mobile */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .summary-card .value {
                font-size: 1.4rem;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.8rem;
            }

            .card-thumb, .no-image {
                width: 45px;
                height: 60px;
            }

            .modal-prev {
                left: 10px;
            }

            .modal-next {
                right: 10px;
            }

            .cert-number {
                font-size: 0.7rem;
            }
        }

        /* Hidden rows for search */
        .hidden {
            display: none !important;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #64748b;
            font-size: 0.85rem;
        }
    </style>
</head>

        const modalClose = document.getElementById('modalClose');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');

        // Format currency
        function formatCurrency(value) {
            return '$' + value.toLocaleString('en-HK');
        }

        // Render table
        function renderTable(data = cards) {
            tableBody.innerHTML = data.map((card, index) => {
                const profitClass = card.profit >= 0 ? 'profit' : 'loss';
                const gradeClass = card.grade === 'PSA 10' ? 'grade-10' : 'grade-9';
                const thumbHtml = card.image 
                    ? `<img src="${card.image}" alt="${card.name}" class="card-thumb" data-index="${index}">`
                    : `<div class="no-image">No Image</div>`;
                
                return `
                    <tr data-index="${index}">
                        <td>${thumbHtml}</td>
                        <td class="cert-number">${card.cert}</td>
                        <td class="card-name">${card.name}</td>
                        <td><span class="grade ${gradeClass}">${card.grade}</span></td>
                        <td class="price price-cost">${formatCurrency(card.cost)}</td>
                        <td class="price price-market">${formatCurrency(card.market)}</td>
                        <td class="price ${profitClass}">${card.profit >= 0 ? '+' : ''}${formatCurrency(card.profit)}</td>
                    </tr>
                `;
            }).join('');

            // Add click handlers for images
            document.querySelectorAll('.card-thumb').forEach(img => {
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(parseInt(img.dataset.index));
                });
            });
        }

        // Update summary
        function updateSummary() {
            const totalCost = cards.reduce((sum, c) => sum + c.cost, 0);
            const totalMarket = cards.reduce((sum, c) => sum + c.market, 0);
            const totalProfit = totalMarket - totalCost;
            const totalReturn = ((totalProfit / totalCost) * 100).toFixed(1);

            document.getElementById('totalCards').textContent = cards.length;
            document.getElementById('totalCost').textContent = formatCurrency(totalCost);
            document.getElementById('totalMarket').textContent = formatCurrency(totalMarket);
            
            const profitEl = document.getElementById('totalProfit');
            profitEl.textContent = (totalProfit >= 0 ? '+' : '') + formatCurrency(totalProfit);
            profitEl.parentElement.className = 'summary-card ' + (totalProfit >= 0 ? 'profit' : 'loss');
            
            document.getElementById('totalReturn').textContent = totalReturn + '%';
        }

        // Sort table
        function sortTable(column) {
            const headers = document.querySelectorAll('th');
            headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));

            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }

            const header = document.querySelector(`th[data-sort="${column}"]`);
            header.classList.add(currentSort.direction === 'asc' ? 'sort-asc' : 'sort-desc');

            const sorted = [...cards].sort((a, b) => {
                let valA = a[column];
                let valB = b[column];

                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }

                if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable(sorted);
            filterTable(searchInput.value);
        }

        // Filter table
        function filterTable(query) {
            const rows = tableBody.querySelectorAll('tr');
            const lowerQuery = query.toLowerCase();

            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                if (text.includes(lowerQuery)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }

        // Modal functions
        function openModal(index) {
            currentModalIndex = index;
            updateModal();
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateModal() {
            const card = cards[currentModalIndex];
            if (card.image) {
                modalImg.src = card.image;
                modalImg.style.display = 'block';
            } else {
                modalImg.style.display = 'none';
            }
            modalInfo.textContent = `${card.name} — ${card.grade} — ${formatCurrency(card.market)}`;
        }

        function nextImage() {
            // Find next card with image
            let attempts = 0;
            do {
                currentModalIndex = (currentModalIndex + 1) % cards.length;
                attempts++;
            } while (!cards[currentModalIndex].image && attempts < cards.length);
            updateModal();
        }

        function prevImage() {
            // Find prev card with image
            let attempts = 0;
            do {
                currentModalIndex = (currentModalIndex - 1 + cards.length) % cards.length;
                attempts++;
            } while (!cards[currentModalIndex].image && attempts < cards.length);
            updateModal();
        }

        // Event listeners
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => sortTable(th.dataset.sort));
        });

        searchInput.addEventListener('input', (e) => filterTable(e.target.value));

        modalClose.addEventListener('click', closeModal);
        modalNext.addEventListener('click', nextImage);
        modalPrev.addEventListener('click', prevImage);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            
            switch(e.key) {
                case 'Escape':
                    closeModal();
                    break;
                case 'ArrowRight':
                    nextImage();
                    break;
                case 'ArrowLeft':
                    prevImage();
                    break;
            }
        });

        // Initialize
        renderTable();
        updateSummary();
    </script>
</body>
</html>
